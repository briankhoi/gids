version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s
      - -w
      - -X github.com/briankhoi/gids/internal/version.version={{.Version}}
    binary: gids

archives:
  - format: tar.gz
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ title .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else if eq .Arch "386" }}i386{{ else }}{{ .Arch }}{{ end }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
  make_latest: true
  mode: replace
  header: |
    ## gids {{.Version}}

    ### Installation

    **macOS and Linux** — pick your architecture:

    ```sh
    # macOS (Apple Silicon)
    curl -sL https://github.com/{{ .Env.GITHUB_REPOSITORY }}/releases/download/{{.Tag}}/gids_{{.Version}}_Darwin_arm64.tar.gz | tar xz && sudo mv gids /usr/local/bin/

    # macOS (Intel)
    curl -sL https://github.com/{{ .Env.GITHUB_REPOSITORY }}/releases/download/{{.Tag}}/gids_{{.Version}}_Darwin_x86_64.tar.gz | tar xz && sudo mv gids /usr/local/bin/

    # Linux (x86_64)
    curl -sL https://github.com/{{ .Env.GITHUB_REPOSITORY }}/releases/download/{{.Tag}}/gids_{{.Version}}_Linux_x86_64.tar.gz | tar xz && sudo mv gids /usr/local/bin/

    # Linux (ARM64)
    curl -sL https://github.com/{{ .Env.GITHUB_REPOSITORY }}/releases/download/{{.Tag}}/gids_{{.Version}}_Linux_arm64.tar.gz | tar xz && sudo mv gids /usr/local/bin/
    ```

    **Windows** — download `gids_{{.Version}}_Windows_x86_64.zip` from the assets below and place `gids.exe` on your `PATH`.

    ---
  footer: |
    **Full Changelog**: https://github.com/{{ .Env.GITHUB_REPOSITORY }}/compare/{{.PreviousTag}}...{{.Tag}}