version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s
      - -w
      - -X github.com/briankhoi/gids/internal/version.version={{.Version}}
    binary: gids

archives:
  - format: tar.gz
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ title .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else if eq .Arch "386" }}i386{{ else }}{{ .Arch }}{{ end }}{{ if .Arm }}v{{ .Arm }}{{ end }}'
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

release:
  draft: false
  prerelease: auto
  make_latest: true
  mode: replace
  header: |
    ## Release {{.Version}}

    ### Installation

    **macOS (Apple Silicon)**
    ```bash
    curl -sL [https://github.com/](https://github.com/){{ .Env.GITHUB_REPOSITORY }}/releases/download/{{.Tag}}/gids_{{.Version}}_Darwin_arm64.tar.gz | tar xz
    sudo mv gids /usr/local/bin/
    ```

    **macOS (Intel)**
    ```bash
    curl -sL [https://github.com/](https://github.com/){{ .Env.GITHUB_REPOSITORY }}/releases/download/{{.Tag}}/gids_{{.Version}}_Darwin_x86_64.tar.gz | tar xz
    sudo mv gids /usr/local/bin/
    ```

    **Linux (x86_64)**
    ```bash
    curl -sL [https://github.com/](https://github.com/){{ .Env.GITHUB_REPOSITORY }}/releases/download/{{.Tag}}/gids_{{.Version}}_Linux_x86_64.tar.gz | tar xz
    sudo mv gids /usr/local/bin/
    ```

    **Linux (ARM64)**
    ```bash
    curl -sL [https://github.com/](https://github.com/){{ .Env.GITHUB_REPOSITORY }}/releases/download/{{.Tag}}/gids_{{.Version}}_Linux_arm64.tar.gz | tar xz
    sudo mv gids /usr/local/bin/
    ```

    **Windows (x86_64)**
    ```powershell
    # Download and extract gids_{{.Version}}_Windows_x86_64.zip
    # Move gids.exe to a directory in your PATH
    ```

    Or download the appropriate binary directly from the assets below.
  footer: |
    **Full Changelog**: https://github.com/{{ .Env.GITHUB_REPOSITORY }}/compare/{{.PreviousTag}}...{{.Tag}}